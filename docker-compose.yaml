services:
  catalogue:
    build: ./catalogue
    image: sravankumar152/catalogue:1.0.0
    container_name: catalogue
    depends_on:
    - mongodb
  
  user:
    build: ./USER
    image: sravankumar152/user:1.0.0
    container_name: user
    depends_on:
    - redis
    - mongodb
  
  cart:
    build: ./CART
    image: sravankumar152/cart:1.0.0
    container_name: cart
    depends_on:
    - redis
    - catalogue
  
  shipping:
    build: ./shipping
    image: sravankumar152/shipping:1.0.0
    container_name: shipping
    depends_on:
    - cart
    - mysql
  
  payment:
    build: ./payment
    image: sravankumar152/payment:1.0.0
    container_name: payment
    environemt:
      CART_HOST: cart
      CART_PORT: 8080
      USER_HOST: user
      USER_PORT: 8080
      AMQP_HOST: rabbitmq
      AMQP_USER: roboshop
      AMQP_PASS: roboshop123
    depends_on:
    - cart
    - user
    - rabbitmq
  
  frontend:
    build: ./FrontEnd
    image: sravankumar152/frontend:1.0.0
    container_name: frontend
    ports:
    - "80:80"
    depends_on:
    - catalogue
    - user
    - cart
    - shipping
  
  mongodb:
    build: ./MongoDB
    image: sravankumar152/mongodb:1.0.0
    container_name: mongodb
  redis:
    image: redis:7.0
    container_name: redis
  mysql:
    build: ./Mysql
    image: sravankumar152/mysql:1.0.0
    container_name: mysql
  rabbitmq:
    image: rabbitmq:3
    environment:
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
    container_name: rabbitmq
  
networks:
  default:
    driver: bridge
    name: roboshop
    external: false #if it's true we need to create a bridge network manually