services:
  catalogue:
    build: ./catalogue
    image: sravankumar152/catalogue:1.0.0
    container_name: catalogue
    depends_on:
    - mongodb
  
  user:
    build: ./USER
    image: sravankumar152/user:1.0.0
    container_name: user
    depends_on:
    - redis
    - mongodb
  
  cart:
    build: ./CART
    image: sravankumar152/cart:1.0.0
    container_name: cart
    depends_on:
    - redis
  
  frontend:
    build: ./FrontEnd
    image: sravankumar152/frontend:1.0.0
    container_name: frontend
    ports:
    - "80:80"
    depends_on:
    - catalogue
    - user
    - cart
  
  mongodb:
    build: ./MongoDB
    image: sravankumar152/mongodb:1.0.0
    container_name: mongodb
  redis:
    image: redis:7.0
    container_name: redis
  mysql:
    build: ./Mysql
    image: sravankumar152/mysql:1.0.0
    container_name: mysql
  
networks:
  default:
    driver: bridge
    name: roboshop
    external: false #if it's true we need to create a bridge network manually